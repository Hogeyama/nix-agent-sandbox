# listener 0.0.0.0:15001
static_resources:
  listeners:
    - name: nas-egress-listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 15001
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: nas-egress
                stream_idle_timeout: 0s
                request_timeout: 0s
                access_log:
                  - name: envoy.access_loggers.stdout
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                route_config:
                  name: nas-egress-route
                  virtual_hosts:
                    - name: nas-egress
                      domains: ["*"]
                      routes:
                        - match:
                            connect_matcher: {}
                          route:
                            cluster: dynamic_forward_proxy_cluster
                            timeout: 0s
                            upgrade_configs:
                              - upgrade_type: CONNECT
                                connect_config: {}
                        - match:
                            prefix: "/"
                          route:
                            cluster: dynamic_forward_proxy_cluster
                            timeout: 0s
                http_filters:
                  - name: envoy.filters.http.lua
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                      default_source_code:
                        inline_string: |
                          function envoy_on_request(handle)
                            local method = handle:headers():get(":method") or ""
                            local authority = handle:headers():get(":authority") or ""
                            local path = handle:headers():get(":path") or ""
                            local proxy_auth = handle:headers():get("proxy-authorization") or ""
                            local host = handle:headers():get("host") or ""
                            local request_id = handle:headers():get("x-request-id") or ""

                            local check_headers = {
                              [":method"] = "GET",
                              [":path"] = "/authorize",
                              [":authority"] = "auth-router",
                              ["proxy-authorization"] = proxy_auth,
                              ["host"] = host,
                              ["x-request-id"] = request_id,
                              ["x-nas-original-method"] = method,
                              ["x-nas-original-authority"] = authority,
                              ["x-nas-original-url"] = path,
                            }

                            local resp_headers, resp_body = handle:httpCall(
                              "auth-router",
                              check_headers,
                              "",
                              300000,
                              false
                            )

                            if resp_headers == nil then
                              handle:respond({[":status"] = "403"}, "auth-router unavailable")
                              return
                            end

                            local status = tonumber(resp_headers[":status"])
                            if not status or status ~= 200 then
                              handle:respond(
                                {[":status"] = tostring(status or 403)},
                                resp_body or "denied"
                              )
                              return
                            end

                            -- Remove proxy-authorization before forwarding
                            handle:headers():remove("proxy-authorization")
                          end
                  - name: envoy.filters.http.dynamic_forward_proxy
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.dynamic_forward_proxy.v3.FilterConfig
                      dns_cache_config:
                        name: dynamic_forward_proxy_cache
                        dns_lookup_family: V4_ONLY
                        typed_dns_resolver_config:
                          name: envoy.network.dns_resolver.getaddrinfo
                          typed_config:
                            "@type": type.googleapis.com/envoy.extensions.network.dns_resolver.getaddrinfo.v3.GetAddrInfoDnsResolverConfig
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
  clusters:
    - name: dynamic_forward_proxy_cluster
      connect_timeout: 5s
      lb_policy: CLUSTER_PROVIDED
      cluster_type:
        name: envoy.clusters.dynamic_forward_proxy
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.clusters.dynamic_forward_proxy.v3.ClusterConfig
          dns_cache_config:
            name: dynamic_forward_proxy_cache
            dns_lookup_family: V4_ONLY
            typed_dns_resolver_config:
              name: envoy.network.dns_resolver.getaddrinfo
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.network.dns_resolver.getaddrinfo.v3.GetAddrInfoDnsResolverConfig
    - name: auth-router
      connect_timeout: 300s
      type: STATIC
      load_assignment:
        cluster_name: auth-router
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    pipe: { path: /nas-network/auth-router.sock }
