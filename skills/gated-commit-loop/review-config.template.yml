workflow:
  # 計画フェーズのループ上限（reject が続いた場合）
  max_plan_iterations: 3
  # 各コミットのレビューループ上限
  max_review_iterations: 3
  # コードレビューのデフォルト終了条件
  stop_when: no_critical_findings

rules:
  - name: error-handling
    severity: critical
    stop_when: no_findings # エラーハンドリングは warning でも差し戻す
    description: "エラーが握りつぶされていないか。catchブロックが空、エラーを無視するコードがないか"

  - name: security
    severity: critical
    stop_when: no_findings # セキュリティは warning でも差し戻す
    description: "SQLインジェクション、XSS、コマンドインジェクション等の脆弱性がないか"

  - name: layer-boundary
    severity: critical
    stop_when: no_critical_findings
    skill: backend-coding-guidelines
    description: |
      各層の責務と依存方向がプロジェクトのレイヤーの定義に
      従っているか。

      チェック手順:
      1) 変更ファイルの属する層を特定する
      2) その層の禁止事項に該当する処理がないか判定する
      3) 違反があれば、正しい層への移譲を求める

  - name: correctness
    severity: critical
    stop_when: no_findings # 機能が壊れる変更は差し戻す
    description: |
      変更後の挙動が機能として壊れないか。error-handling / security とは別に、
      design が責務・可読性を見るのに対し、correctness は「実際に壊れるか」を
      見る (壊れるなら warning ではなく critical として差し戻す)。
      diff の行を静的に眺めるだけでは現れない破綻が主眼なので、次の手順で能動的に探す:

      1) 行ごとの精査: 各 hunk を1行ずつ読み、さらにその行を含む関数・
         コンポーネント全体を読む。変更行だけでなく、触れた箇所の未変更行のバグも
         対象 (変更がそれを再露出させる / 直し損ねるため)。各行・各分岐について
         「どんな入力・状態・順序・タイミングなら、この行は誤った結果になるか」を問う。
         逆転した条件、off-by-one、null/undefined 参照、falsy(0/空)の取り違え、
         コピペの変数取り違え、握り潰した例外、未確立の前提 などを疑う。
      2) 消えた振る舞いの監査: diff が削除・置換した行が担っていた不変条件や
         振る舞いを言語化し、新コードのどこで再確立されているか探す。見つからな
         ければ指摘対象 (外したガード、落ちたエラー経路、緩めた検証、消えたテスト)。
      3) 跨ぎの追跡: 変更した関数・値の呼び出し側 (Grep) と呼び出し先を確認し、
         変更が前提条件・戻り値の形・例外・順序や状態の依存を壊していないか。
         変更が未変更コード (スキーマ / 検証 / 共有状態 等) と相互作用して壊す
         場合は、根因が未変更行でも指摘してよい。

      happy path だけで終えない。具体的な不具合経路はコードから自分で発見すること。

  - name: design
    severity: warning
    stop_when: no_findings # 設計上の warning も差し戻す
    description: "責務分離、副作用の置き場、抽象境界、依存関係、データフローに無理がないか"

  - name: tombstone-comments
    severity: warning
    stop_when: no_critical_findings
    description: |
      コメント・doc・commit message が、読者が時間軸の文脈
      (過去の実装 / 未来の予定変更 / 別コミットの計画) を補わないと
      意味が通らない書き方になっていないか。判定基準は「時間軸依存性」
      であり、特定の単語パターンではない。

      NG (過去依存 / 移行履歴):
        - "previously was X" / "以前は X"
        - "legacy approach" / "mirrors the old"
        - "rewrite of" / "supersedes the old helper" / "移行後"
        - "(see Commit 3)" / "Commit N で削除した"

      NG (未来予告 / 未実装参照):
        - "will be added in Commit N" / "次のコミットで X"
        - "TODO: implement in next PR" / "Commit 8 で fatten"
        - "to be filled in later" / "この後拡張する予定"
        - 「将来の変更計画を読者が知らないと意味が通らない」記述全般

      OK (現在の状態を declarative に記述):
        - "X does Y" / "X handles Y"
        - "does not touch ..." / "no longer contributes ..." (現在形の否定)
        - "there is no in-band CONNECT tunnel" (現在の状態の打ち消し)
        - "Currently delegates to X" / "for now ..." (現在の挙動の記述。
          未来変更の緩い含みは OK だが、具体的な commit / PR / TODO 参照は NG)

      判定: そのコメントを「過去の実装も未来の計画も知らない読者」が
      読んで意味が通るかどうか。通れば OK。通らなければ NG。

  - name: test-coverage
    severity: warning
    stop_when: no_findings # テスト不足の warning も差し戻す
    description: "変更箇所に対応するテストがあるか。主要なロジックにテストが書かれているか"

  - name: naming
    severity: warning
    description: "変数名・関数名がプロジェクトの命名規則に従っているか"
