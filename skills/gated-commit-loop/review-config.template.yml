# レビュー設定
# - ここにルールを足すだけでレビュー観点を拡張できる
# - severity: critical (差し戻し), warning (推奨), info (参考)
# - stop_when: ルールごとに設定可能。省略時は workflow.stop_when を使用
#     no_critical_findings: critical がなければ OK
#     no_findings: warning/info を含め findings が一切なければ OK

workflow:
  # 計画フェーズのループ上限（reject が続いた場合）
  max_plan_iterations: 3
  # 各コミットのレビューループ上限
  max_review_iterations: 3
  # コードレビューのデフォルト終了条件
  stop_when: no_critical_findings

rules:
  - name: error-handling
    severity: critical
    stop_when: no_findings # エラーハンドリングは warning でも差し戻す
    description: "エラーが握りつぶされていないか。catchブロックが空、エラーを無視するコードがないか"

  - name: security
    severity: critical
    stop_when: no_findings # セキュリティは warning でも差し戻す
    description: "SQLインジェクション、XSS、コマンドインジェクション等の脆弱性がないか"

  - name: design
    severity: warning
    stop_when: no_critical_findings # 設計上の critical のみ差し戻す
    description: |
      責務分離、副作用の置き場、抽象境界、依存関係、データフローに無理がないか。
      severity の使い分け:
        critical: 放置するとバグ・リグレッション・データ不整合を引き起こす設計問題
          例: 未使用 export が外部契約を暗示、探索ロジックの不整合、検証ロジック除去によるリグレッション
        warning: 改善が望ましいが放置しても壊れない
          例: 命名の非対称、コメントの不正確さ、軽微な重複

  - name: tombstone-comments
    severity: info
    stop_when: no_critical_findings
    description: |
      コメント・doc・commit message が、読者が時間軸の文脈
      (過去の実装 / 未来の予定変更 / 別コミットの計画) を補わないと
      意味が通らない書き方になっていないか。判定基準は「時間軸依存性」
      であり、特定の単語パターンではない。

      NG (過去依存 / 移行履歴):
        - "previously was X" / "以前は X"
        - "legacy approach" / "mirrors the old"
        - "rewrite of" / "supersedes the old helper" / "移行後"
        - "(see Commit 3)" / "Commit N で削除した"

      NG (未来予告 / 未実装参照):
        - "will be added in Commit N" / "次のコミットで X"
        - "TODO: implement in next PR" / "Commit 8 で fatten"
        - "to be filled in later" / "この後拡張する予定"
        - 「将来の変更計画を読者が知らないと意味が通らない」記述全般

      OK (現在の状態を declarative に記述):
        - "X does Y" / "X handles Y"
        - "does not touch ..." / "no longer contributes ..." (現在形の否定)
        - "there is no in-band CONNECT tunnel" (現在の状態の打ち消し)
        - "Currently delegates to X" / "for now ..." (現在の挙動の記述。
          未来変更の緩い含みは OK だが、具体的な commit / PR / TODO 参照は NG)

      判定: そのコメントを「過去の実装も未来の計画も知らない読者」が
      読んで意味が通るかどうか。通れば OK。通らなければ NG。

  - name: test-coverage
    severity: warning
    stop_when: no_critical_findings # テスト不足の critical のみ差し戻す
    description: |
      変更箇所に対応するテストがあるか。主要なロジックにテストが書かれているか。
      特に以下を重視:
        - 統合テスト: 複数モジュールを組み合わせた実行パスのカバー
        - エッジケース: ファイル不在、環境差異、空入力、不正入力
        - ビルド・パッケージング: アセットコピー漏れ、バンドル対象の網羅
      severity の使い分け:
        critical: そのテストがないと本番でバグが顕在化するリスクが高い
          例: エラーパス (ENOENT等) のテスト欠落、検証ロジック変更後の回帰テスト欠落
        warning: あると安心だが欠落しても即座にバグにはならない
          例: 既存テストが暗黙的にカバーしているパス、info レベルの表示テスト
