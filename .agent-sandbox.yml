default: copilot

profiles:
  claude:
    agent: claude
    worktree:
      base: HEAD
      on-create: deno install
    agent-args:
      - --permission-mode
      - auto
    nix:
      enable: auto
      mount-socket: true
    docker:
      mount-socket: true
    gcloud:
      mount-config: true
    aws:
      mount-config: true
    gpg:
      forward-agent: true
    extra-mounts:
      - src: ~/.cache/.bun
        dst: ~/.cache/.bun
        mode: rw

  copilot:
    agent: copilot
    agent-args:
      - "--yolo"
    nix:
      enable: auto
      mount-socket: true
    docker:
      mount-socket: true
    gcloud:
      mount-config: true
    aws:
      mount-config: true
    gpg:
      forward-agent: true

  codex:
    agent: codex
    agent-args:
      - --full-auto
    nix:
      enable: auto
      mount-socket: true
    docker:
      mount-socket: true
    gcloud:
      mount-config: true
    aws:
      mount-config: true
    gpg:
      forward-agent: true

  copilot-worktree:
    agent: copilot
    agent-args:
      - "--yolo"
    worktree:
      base: main
      on-create: deno install
    nix:
      enable: auto
      mount-socket: true
    docker:
      mount-socket: true
    gcloud:
      mount-config: true
    aws:
      mount-config: true
    gpg:
      forward-agent: true
