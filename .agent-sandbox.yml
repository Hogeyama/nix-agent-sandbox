default: claude

profiles:
  claude:
    agent: claude
    agent-args:
      - --allowedTools
      - "Bash(*)"
      - --allowedTools
      - "Edit"
      - --disallowedTools
      - "Bash(git push *)"
    nix:
      enable: auto
      mount-socket: true
    docker:
      enable: true
      shared: true
    gcloud:
      mount-config: true
    aws:
      mount-config: true
    gpg:
      forward-agent: true
    env:
      - key: GITHUB_TOKEN
        val_cmd: gh auth token

  codex:
    agent: codex
    agent-args:
      - --full-auto
    nix:
      enable: auto
      mount-socket: true
    docker:
      enable: true
      shared: true
    gcloud:
      mount-config: true
    aws:
      mount-config: true
    gpg:
      forward-agent: true
    env:
      - key: GITHUB_TOKEN
        val_cmd: gh auth token
    extra-mounts:
      - # gitignoreが居る
        src: ~/nix-config
        dst: ~/nix-config
        mode: ro
      - # codexでkeyringに認証情報を持たせるなら必須
        # だけど権限強すぎるよなあ
        src: /run/user/1000/bus
        dst: /run/user/1000/bus

  copilot:
    agent: copilot
    agent-args:
      - --allow-all-paths
      - --allow-tool=shell
      - --allow-tool=write
      - --deny-tool=shell(git push)
    nix:
      enable: auto
      mount-socket: true
    docker:
      enable: true
      shared: true
    gcloud:
      mount-config: true
    aws:
      mount-config: true
    gpg:
      forward-agent: true
    env:
      - key: GITHUB_TOKEN
        val_cmd: gh auth token
