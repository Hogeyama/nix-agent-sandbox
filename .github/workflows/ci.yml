name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@b66b36319cc6fde4ea85edd583b088c65d6b8710 # v22

      - uses: DeterminateSystems/magic-nix-cache-action@1828eb4e5414b8dfe36daae53ea3e4b8c3fdec7a # v13

      - name: Install dependencies
        run: nix develop -c bun install --frozen-lockfile

      - name: Type check
        run: nix develop -c bunx tsc --noEmit

      - name: Lint
        run: nix develop -c bun run lint

      - name: Unit tests
        run: nix develop -c bun run test:unit
